<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nghĩa Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .admin-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .nav-btn.active { background: #6366f1; color: white; border-color: #818cf8; }
        .status-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 9999px; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.2); color: #fbbf24; }
        .completed { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation Bar -->
    <nav class="border-b border-slate-800 bg-slate-900/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center font-bold text-white">N</div>
                <span class="font-bold text-lg tracking-tight">NGHĨA <span class="text-indigo-500">ADMIN</span></span>
            </div>
            <div id="admin-status" class="flex items-center gap-2 text-xs font-medium text-slate-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Hệ thống đang chạy
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="admin-card p-6">
                <p class="text-slate-400 text-sm font-medium">Đơn nạp chờ duyệt</p>
                <h3 id="stat-recharge" class="text-3xl font-bold mt-1 text-yellow-500">0</h3>
            </div>
            <div class="admin-card p-6">
                <p class="text-slate-400 text-sm font-medium">Đơn game đang xử lý</p>
                <h3 id="stat-orders" class="text-3xl font-bold mt-1 text-sky-500">0</h3>
            </div>
            <div class="admin-card p-6">
                <p class="text-slate-400 text-sm font-medium">Thu nhập hôm nay</p>
                <h3 id="stat-income" class="text-3xl font-bold mt-1 text-emerald-500">0đ</h3>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="showTab('recharges')" id="tab-recharges" class="nav-btn active whitespace-nowrap px-6 py-2.5 rounded-xl border border-slate-700 font-bold text-sm transition-all flex items-center gap-2">
                <i class="fa-solid fa-credit-card"></i> Duyệt Nạp Tiền
            </button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn whitespace-nowrap px-6 py-2.5 rounded-xl border border-slate-700 font-bold text-sm transition-all text-slate-400 flex items-center gap-2">
                <i class="fa-solid fa-gamepad"></i> Duyệt Đơn Game
            </button>
        </div>

        <!-- Content Area -->
        <div id="content-recharges" class="space-y-4">
            <div id="recharge-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Data injected here -->
            </div>
        </div>

        <div id="content-orders" class="hidden space-y-4">
            <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Data injected here -->
            </div>
        </div>

    </main>

    <!-- Modal Thông báo -->
    <div id="toast" class="fixed bottom-6 right-6 p-4 rounded-xl shadow-2xl transition-all translate-y-20 opacity-0 z-[100] admin-card border-indigo-500/50 min-w-[250px]">
        <div class="flex items-center gap-3">
            <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>
            <p id="toast-text" class="font-bold text-sm text-white"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, updateDoc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nghia-store-pro';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                await signInAnonymously(auth);
            } else {
                startListeners();
            }
        });

        function startListeners() {
            // 1. Lắng nghe đơn nạp tiền
            const rechargeCol = collection(db, 'artifacts', appId, 'public', 'data', 'recharges');
            onSnapshot(rechargeCol, (snap) => {
                const list = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(i => i.status === 'pending');
                document.getElementById('stat-recharge').innerText = list.length;
                renderRecharges(list);
            });

            // 2. Lắng nghe đơn game
            const orderCol = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(orderCol, (snap) => {
                const list = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(i => i.status === 'pending');
                document.getElementById('stat-orders').innerText = list.length;
                renderOrders(list);
            });
        }

        function renderRecharges(items) {
            const container = document.getElementById('recharge-list');
            if(items.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500 font-medium">Không có yêu cầu nạp tiền nào</div>`;
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="admin-card p-5 border-t-4 border-emerald-500 group transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <span class="status-badge pending">Chờ duyệt nạp</span>
                        <span class="text-[10px] text-slate-500">${new Date(item.createdAt?.seconds * 1000).toLocaleString() || 'Vừa xong'}</span>
                    </div>
                    <div class="text-2xl font-black text-emerald-400 mb-1">${item.amount.toLocaleString()}đ</div>
                    <div class="bg-black/30 rounded p-2 mb-4 text-xs font-mono">
                        <div class="text-slate-500 mb-1 uppercase tracking-tighter">UID Khách hàng:</div>
                        <div class="text-white select-all">${item.uid}</div>
                    </div>
                    <button onclick="approveRecharge('${item.id}', '${item.uid}', ${item.amount})" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-lg font-bold text-sm transition-all shadow-lg shadow-emerald-900/20">
                        XÁC NHẬN CỘNG TIỀN
                    </button>
                </div>
            `).join('');
        }

        function renderOrders(items) {
            const container = document.getElementById('order-list');
            if(items.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500 font-medium">Không có đơn hàng game mới</div>`;
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="admin-card p-5 border-t-4 border-sky-500">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-sky-400 text-sm uppercase">${item.type}</h4>
                        <span class="status-badge pending">Đang chờ</span>
                    </div>
                    <div class="text-lg font-bold mb-4">${(item.price || 0).toLocaleString()}đ</div>
                    
                    <div class="space-y-2 mb-4">
                        <div class="bg-black/40 p-2 rounded relative group">
                            <span class="text-[10px] text-slate-500 block">TÀI KHOẢN:</span>
                            <span class="text-white font-mono text-sm select-all">${item.acc}</span>
                            <i class="fa-regular fa-copy absolute right-2 top-1/2 -translate-y-1/2 text-slate-600 opacity-0 group-hover:opacity-100"></i>
                        </div>
                        <div class="bg-black/40 p-2 rounded relative group">
                            <span class="text-[10px] text-slate-500 block">MẬT KHẨU:</span>
                            <span class="text-white font-mono text-sm select-all">${item.pass}</span>
                            <i class="fa-regular fa-copy absolute right-2 top-1/2 -translate-y-1/2 text-slate-600 opacity-0 group-hover:opacity-100"></i>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="updateOrderStatus('${item.id}', 'completed')" class="flex-1 bg-sky-600 hover:bg-sky-500 py-2 rounded font-bold text-xs transition-all">HOÀN TẤT</button>
                        <button onclick="updateOrderStatus('${item.id}', 'failed')" class="px-4 bg-red-600/20 hover:bg-red-600/40 text-red-500 py-2 rounded font-bold text-xs transition-all">HUỶ</button>
                    </div>
                </div>
            `).join('');
        }

        // --- HÀNH ĐỘNG ---

        window.approveRecharge = async (docId, uid, amount) => {
            try {
                // Sử dụng Transaction để đảm bảo tính nhất quán dữ liệu (Cộng tiền xong mới đổi trạng thái nạp)
                const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');
                const rechargeRef = doc(db, 'artifacts', appId, 'public', 'data', 'recharges', docId);

                await runTransaction(db, async (transaction) => {
                    const userSnap = await transaction.get(userRef);
                    let currentBalance = 0;
                    if (userSnap.exists()) {
                        currentBalance = userSnap.data().balance || 0;
                    }
                    
                    // 1. Cộng tiền
                    transaction.set(userRef, { balance: currentBalance + amount }, { merge: true });
                    // 2. Chốt đơn nạp
                    transaction.update(rechargeRef, { status: 'completed', approvedAt: serverTimestamp() });
                });

                showToast(`Đã cộng ${amount.toLocaleString()}đ cho khách!`, 'success');
            } catch (e) {
                console.error(e);
                showToast("Lỗi duyệt nạp: " + e.message, 'error');
            }
        };

        window.updateOrderStatus = async (docId, status) => {
            try {
                const orderRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', docId);
                await updateDoc(orderRef, { status: status, processedAt: serverTimestamp() });
                showToast(status === 'completed' ? "Đã duyệt đơn thành công!" : "Đã huỷ đơn hàng!", 'success');
            } catch (e) {
                showToast("Lỗi cập nhật: " + e.message, 'error');
            }
        };

        // --- UI HELPERS ---

        window.showTab = (type) => {
            document.getElementById('content-recharges').classList.toggle('hidden', type !== 'recharges');
            document.getElementById('content-orders').classList.toggle('hidden', type !== 'orders');
            
            document.getElementById('tab-recharges').classList.toggle('active', type === 'recharges');
            document.getElementById('tab-recharges').classList.toggle('text-slate-400', type !== 'recharges');
            
            document.getElementById('tab-orders').classList.toggle('active', type === 'orders');
            document.getElementById('tab-orders').classList.toggle('text-slate-400', type !== 'orders');
        };

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            const icon = document.getElementById('toast-icon');
            
            text.innerText = msg;
            icon.className = type === 'success' ? 'fa-solid fa-circle-check text-emerald-500 text-xl' : 'fa-solid fa-triangle-exclamation text-red-500 text-xl';
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

    </script>
</body>
</html>
