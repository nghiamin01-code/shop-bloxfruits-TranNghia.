<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - SHOP BẮP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        #admin-content { display: none; } /* Ẩn nội dung khi chưa nhập pass */
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn-tab { padding: 10px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s; background: #334155; color: #94a3b8; white-space: nowrap; }
        .btn-tab.active { background: #3b82f6; color: white; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
        .btn-green { background: #22c55e; color: black; font-weight: bold; padding: 8px 16px; border-radius: 6px; transition: 0.2s; }
        .btn-green:hover { background: #16a34a; transform: scale(1.02); }
        .btn-red { background: #ef4444; color: white; font-weight: bold; padding: 8px 16px; border-radius: 6px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .info-box { background: rgba(255,255,255,0.05); border: 1px ridge rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 bg-[#0f172a] z-[999] flex items-center justify-center p-6">
        <div class="max-w-sm w-full bg-[#1e293b] p-8 rounded-2xl shadow-2xl border border-blue-500/30 text-center">
            <h2 class="text-2xl font-bold text-blue-400 mb-6 uppercase">Xác minh Admin</h2>
            <input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." class="text-center mb-4 text-lg">
            <button onclick="checkPass()" class="btn-green w-full py-3 text-lg">ĐĂNG NHẬP</button>
            <p id="fail-msg" class="text-red-500 mt-4 hidden text-sm font-bold">Mật khẩu không chính xác!</p>
        </div>
    </div>

    <div id="admin-content" class="p-4 lg:p-10">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-black mb-8 text-yellow-400 text-center uppercase tracking-tighter">Hệ Thống Quản Trị Shop Bắp</h1>

            <div class="flex overflow-x-auto gap-2 mb-8 pb-2 justify-start md:justify-center no-scrollbar">
                <button class="btn-tab active" onclick="openTab(event, 'tab-orders')">📦 Đơn Acc</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-boost')">🎮 Đơn Cày Thuê</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-cards')">💳 Duyệt Thẻ</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-bank')">🏦 Duyệt Bank</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-price')">🏷️ Đổi Giá Shop</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-money')">💰 Cộng Tiền User</button>
            </div>

            <div class="card min-h-[400px]">
                <div id="tab-orders" class="tab-content active">
                    <h2 class="text-xl font-bold mb-6 text-blue-400 border-b border-white/10 pb-2">📦 Đơn hàng Acc/Item (Mới Nhất)</h2>
                    <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-boost" class="tab-content">
                    <h2 class="text-xl font-bold mb-6 text-cyan-400 border-b border-white/10 pb-2">🎮 Đơn Cày Thuê Chờ Duyệt</h2>
                    <div id="boost-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-cards" class="tab-content">
                    <h2 class="text-xl font-bold mb-6 text-yellow-500 border-b border-white/10 pb-2">💳 Danh Sách Thẻ Cào</h2>
                    <div id="card-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </div>

                <div id="tab-bank" class="tab-content">
                    <h2 class="text-xl font-bold mb-6 text-purple-400 border-b border-white/10 pb-2">🏦 Duyệt ATM/MOMO</h2>
                    <div id="bank-list" class="space-y-3"></div>
                </div>

                <div id="tab-price" class="tab-content">
                    <h2 class="text-xl font-bold mb-6 text-orange-400 border-b border-white/10 pb-2">🏷️ Thay đổi giá sản phẩm</h2>
                    <div class="max-w-md mx-auto space-y-4 bg-black/20 p-6 rounded-xl border border-white/5">
                        <input type="text" id="product-id" placeholder="Nhập Tên Sản Phẩm (Ví dụ: Dragon VV)">
                        <input type="number" id="new-price" placeholder="Giá mới">
                        <button onclick="changeProductPrice()" class="btn-green w-full py-3">CẬP NHẬT GIÁ</button>
                    </div>
                </div>

                <div id="tab-money" class="tab-content">
                    <h2 class="text-xl font-bold mb-6 text-green-400 border-b border-white/10 pb-2">💰 Nạp tiền cho khách</h2>
                    <div class="max-w-md mx-auto space-y-4 bg-black/20 p-6 rounded-xl border border-white/5">
                        <input type="text" id="target-user" placeholder="Tên User">
                        <input type="number" id="target-amount" placeholder="Số tiền cộng">
                        <button onclick="updateBalance()" class="btn-green w-full py-3">XÁC NHẬN CỘNG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KIỂM TRA MẬT KHẨU
        function checkPass() {
            const p = document.getElementById('admin-pass').value;
            if(p === 'nghia672011') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                document.getElementById('fail-msg').classList.remove('hidden');
                document.getElementById('admin-pass').value = '';
            }
        }

        // FIREBASE CONFIG
        const firebaseConfig = { databaseURL: "https://shop-blox-fruit-trannghia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // TAB NAVIGATION
        function openTab(evt, tabName) {
            var i, tabContent, btnTab;
            tabContent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabContent.length; i++) { tabContent[i].classList.remove("active"); }
            btnTab = document.getElementsByClassName("btn-tab");
            for (i = 0; i < btnTab.length; i++) { btnTab[i].classList.remove("active"); }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // RENDER ĐƠN HÀNG THƯỜNG (CÓ MK)
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('order-list'); list.innerHTML = "";
            snap.forEach(s => {
                const o = s.val();
                if(o.status === 'Chờ xử lý') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-xl border-l-4 border-blue-500 shadow-lg">
                            <p class="text-blue-300 font-bold font-mono">USER: ${o.user}</p>
                            <p class="text-white text-sm">Món: ${o.item}</p>
                            <div class="info-box select-all">
                                <b class="text-red-400 uppercase">[Thông tin khách gửi]:</b><br>${o.info}
                            </div>
                            <input type="text" id="proof-${s.key}" placeholder="Link ảnh (nếu có)..." class="mb-3 text-[10px] h-8">
                            <div class="flex gap-2">
                                <button onclick="approveOrder('${s.key}')" class="btn-green text-xs flex-1">XÁC NHẬN Xong</button>
                                <button onclick="cancelOrder('${s.key}', '${o.user}', ${o.price || 0})" class="btn-red text-xs flex-1">HỦY ĐƠN</button>
                            </div>
                        </div>`;
                }
            });
        });

        // RENDER CÀY THUÊ (CÓ MK)
        db.ref('boost_orders').on('value', snap => {
            const list = document.getElementById('boost-list'); list.innerHTML = "";
            snap.forEach(s => {
                const b = s.val();
                if(b.status === 'Chờ xử lý') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-xl border-l-4 border-cyan-500 shadow-lg">
                            <p class="text-cyan-400 font-bold font-mono uppercase">${b.package}</p>
                            <div class="info-box select-all">
                                <b class="text-yellow-400 uppercase">[TÀI KHOẢN | MẬT KHẨU]:</b><br>${b.account_info}
                            </div>
                            <input type="text" id="boost-proof-${s.key}" placeholder="Dán link ảnh thành công..." class="mb-3 text-[10px] h-8">
                            <div class="flex gap-2">
                                <button onclick="approveBoost('${s.key}', '${b.user}')" class="btn-green text-xs flex-1 uppercase">Duyệt (Lên Trang Chủ)</button>
                                <button onclick="cancelBoost('${s.key}', '${b.user}', ${b.price || 0})" class="btn-red text-xs flex-1">HỦY</button>
                            </div>
                        </div>`;
                }
            });
        });

        // HÀM ĐỔI GIÁ (ĐÃ SỬA ĐỂ TÌM THEO TÊN)
        async function changeProductPrice() {
            const inputName = document.getElementById('product-id').value.trim();
            const p = parseInt(document.getElementById('new-price').value);
            if(!inputName || isNaN(p)) return alert("Vui lòng điền đủ Tên sản phẩm và Giá!");

            const productsRef = db.ref('products');
            const snap = await productsRef.once('value');
            let found = false;
            let targetId = null;

            // Vòng lặp tìm sản phẩm có tên khớp với input
            snap.forEach(childSnap => {
                const product = childSnap.val();
                if (product.name && product.name.toLowerCase() === inputName.toLowerCase()) {
                    found = true;
                    targetId = childSnap.key; // Lấy ID của sản phẩm đó
                }
            });

            if (found && targetId) {
                await db.ref('products/' + targetId).update({ price: p });
                alert("Thành công! Đã cập nhật giá mới cho '" + inputName + "' là " + p.toLocaleString() + "đ");
                document.getElementById('product-id').value = ""; 
                document.getElementById('new-price').value = "";
            } else {
                alert("Không tìm thấy sản phẩm nào có tên là: " + inputName + ". Lưu ý phải nhập chính xác tên hiển thị trên shop!");
            }
        }

        // HÀM DUYỆT ĐƠN
        async function approveOrder(key) {
            const p = document.getElementById('proof-'+key).value;
            await db.ref('orders/'+key).update({ status: 'Thành công', proof_image: p || "" });
            alert("Duyệt đơn thành công!");
        }

        async function approveBoost(key, user) {
            const p = document.getElementById('boost-proof-'+key).value;
            if(!p) return alert("Vui lòng nhập link ảnh để khách tin tưởng!");
            await db.ref('boost_orders/'+key).update({ status: 'Thành công', proof_image: p });
            await db.ref('public_proofs').push({ user: user, image: p, type: "Cày Thuê", time: new Date().toLocaleDateString('vi-VN') });
            alert("Đã duyệt và đẩy ảnh ra trang chủ!");
        }

        // HÀM CỘNG TIỀN
        async function updateBalance() {
            const u = document.getElementById('target-user').value.trim().toLowerCase();
            const a = parseInt(document.getElementById('target-amount').value);
            const snap = await db.ref('users/'+u).get();
            if(!snap.exists()) return alert("User không đúng!");
            await db.ref('users/'+u).update({ balance: (snap.val().balance || 0) + a });
            alert("Cộng tiền thành công cho " + u);
        }

        // RENDER BANK VÀ THẺ CÀO (CÔNG KHAI)
        db.ref('bank_requests').on('value', snap => {
            const list = document.getElementById('bank-list'); list.innerHTML = "";
            snap.forEach(s => { const b = s.val(); if(b.status === 'Chờ duyệt') {
                list.innerHTML += `<div class="bg-black/30 p-4 rounded flex justify-between items-center border border-white/5"><span><b>${b.user}</b>: ${b.amount.toLocaleString()}đ</span><button onclick="approveBank('${s.key}', '${b.user}', ${b.amount})" class="btn-green text-[10px]">DUYỆT BANK</button></div>`;
            }});
        });
        async function approveBank(k,u,a) { const s = await db.ref('users/'+u).get(); if(s.exists()) { await db.ref('users/'+u).update({ balance: (s.val().balance || 0) + a }); await db.ref('bank_requests/'+k).update({ status: 'Đã duyệt' }); alert("Xong!"); } }

        db.ref('card_requests').on('value', snap => {
            const list = document.getElementById('card-list'); list.innerHTML = "";
            snap.forEach(s => { const c = s.val(); if(c.status === 'Chờ duyệt') {
                list.innerHTML += `<div class="bg-black/40 p-4 rounded-xl border border-yellow-500/20 text-[11px]"><p class="font-bold text-yellow-500 text-sm">${c.type} ${c.amount}đ</p><p class="mt-1">Mã: <span class="select-all">${c.code}</span></p><p>Seri: <span class="select-all">${c.seri}</span></p><div class="flex gap-2 mt-3"><button onclick="approveCard('${s.key}','${c.user}',${c.amount})" class="btn-green flex-1">ĐÚNG</button><button onclick="rejectCard('${s.key}')" class="btn-red flex-1">SAI</button></div></div>`;
            }});
        });
        async function approveCard(k,u,a) { const s = await db.ref('users/'+u).get(); if(s.exists()) { await db.ref('users/'+u).update({ balance: (s.val().balance || 0) + parseInt(a) }); await db.ref('card_requests/'+k).update({ status: 'Thành công' }); alert("Duyệt thẻ thành công!"); } }
        async function rejectCard(k) { await db.ref('card_requests/'+k).update({ status: 'Thẻ sai' }); alert("Đã từ chối!"); }
        async function cancelOrder(k,u,r) { if(!confirm("Hủy và hoàn tiền?")) return; const s = await db.ref('users/'+u).get(); if(s.exists()) await db.ref('users/'+u).update({ balance: (s.val().balance || 0) + r }); await db.ref('orders/'+k).update({ status: 'Đã hủy' }); }
        async function cancelBoost(k,u,r) { if(!confirm("Hủy đơn này?")) return; const s = await db.ref('users/'+u).get(); if(s.exists()) await db.ref('users/'+u).update({ balance: (s.val().balance || 0) + r }); await db.ref('boost_orders/'+k).update({ status: 'Đã hủy' }); }
    </script>
</body>
</html>
