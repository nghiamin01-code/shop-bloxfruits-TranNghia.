<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - SHOP BẮP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn-tab { padding: 10px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s; background: #334155; color: #94a3b8; }
        .btn-tab.active { background: #3b82f6; color: white; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
        .btn-green { background: #22c55e; color: black; font-weight: bold; padding: 8px 16px; border-radius: 6px; }
        .btn-red { background: #ef4444; color: white; font-weight: bold; padding: 8px 16px; border-radius: 6px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-8 text-yellow-400 text-center uppercase tracking-tighter">Hệ Thống Quản Trị Shop Bắp</h1>

        <div class="flex flex-wrap gap-2 mb-8 justify-center">
            <button class="btn-tab active" onclick="openTab(event, 'tab-orders')">📦 Đơn Acc/Item</button>
            <button class="btn-tab" onclick="openTab(event, 'tab-boost')">🎮 Đơn Cày Thuê</button>
            <button class="btn-tab" onclick="openTab(event, 'tab-cards')">💳 Duyệt Thẻ</button>
            <button class="btn-tab" onclick="openTab(event, 'tab-bank')">🏦 Duyệt Bank</button>
            <button class="btn-tab" onclick="openTab(event, 'tab-money')">💰 Cộng Tiền</button>
        </div>

        <div class="card">
            <div id="tab-orders" class="tab-content active">
                <h2 class="text-xl font-bold mb-6 text-blue-400 border-b border-white/10 pb-2">📦 Danh sách đơn hàng Acc/Item</h2>
                <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-boost" class="tab-content">
                <h2 class="text-xl font-bold mb-6 text-cyan-400 border-b border-white/10 pb-2">🎮 Quản lý đơn Cày Thuê</h2>
                <div id="boost-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-cards" class="tab-content">
                <h2 class="text-xl font-bold mb-6 text-yellow-500 border-b border-white/10 pb-2">💳 Duyệt Thẻ Cào Chờ</h2>
                <div id="card-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="tab-bank" class="tab-content">
                <h2 class="text-xl font-bold mb-6 text-purple-400 border-b border-white/10 pb-2">🏦 Yêu cầu chuyển khoản</h2>
                <div id="bank-list" class="space-y-3"></div>
            </div>

            <div id="tab-money" class="tab-content">
                <h2 class="text-xl font-bold mb-6 text-green-400 border-b border-white/10 pb-2">💰 Nạp tiền cho thành viên</h2>
                <div class="max-w-md mx-auto space-y-4 bg-black/20 p-6 rounded-xl border border-white/5">
                    <div>
                        <label class="text-xs uppercase font-bold text-gray-400">Tên User</label>
                        <input type="text" id="target-user" placeholder="Nhập tên khách (ví dụ: bắp123)">
                    </div>
                    <div>
                        <label class="text-xs uppercase font-bold text-gray-400">Số tiền muốn cộng</label>
                        <input type="number" id="target-amount" placeholder="Ví dụ: 50000">
                    </div>
                    <button onclick="updateBalance()" class="btn-green w-full py-3 shadow-lg shadow-green-500/20">XÁC NHẬN CỘNG TIỀN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://shop-blox-fruit-trannghia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Hàm chuyển đổi Tab
        function openTab(evt, tabName) {
            var i, tabContent, btnTab;
            tabContent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabContent.length; i++) { tabContent[i].classList.remove("active"); }
            btnTab = document.getElementsByClassName("btn-tab");
            for (i = 0; i < btnTab.length; i++) { btnTab[i].classList.remove("active"); }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- HIỂN THỊ ĐƠN HÀNG THƯỜNG ---
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "<p class='text-gray-500'>Không có đơn nào.</p>"; return; }
            snap.forEach(s => {
                const o = s.val();
                if(o.status === 'Chờ xử lý') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-xl border-l-4 border-blue-500 shadow-xl">
                            <div class="flex justify-between mb-2"><span class="font-bold text-blue-300">#${s.key.slice(-5)}</span> <span class="text-xs opacity-50 text-white">${o.user}</span></div>
                            <p class="text-lg font-bold text-white mb-2">${o.item}</p>
                            <div class="bg-white/5 p-3 rounded mb-4 text-sm font-mono whitespace-pre-wrap">${o.info}</div>
                            <input type="text" id="proof-${s.key}" placeholder="Link ảnh hoàn tất..." class="mb-3 text-xs h-9">
                            <div class="flex gap-2">
                                <button onclick="approveOrder('${s.key}', '${o.user}')" class="btn-green text-xs flex-1">HOÀN TẤT</button>
                                <button onclick="cancelOrder('${s.key}', '${o.user}', ${o.price || 0})" class="btn-red text-xs flex-1">HỦY</button>
                            </div>
                        </div>`;
                }
            });
        });

        // --- HIỂN THỊ ĐƠN CÀY THUÊ (CÓ ẢNH LÊN TRANG CHỦ) ---
        db.ref('boost_orders').on('value', snap => {
            const list = document.getElementById('boost-list');
            list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "<p class='text-gray-500'>Không có đơn cày thuê nào.</p>"; return; }
            snap.forEach(s => {
                const b = s.val();
                if(b.status === 'Chờ xử lý') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-xl border-l-4 border-cyan-500 shadow-xl">
                            <p class="font-bold text-cyan-400 mb-1">Gói: ${b.package}</p>
                            <p class="text-[10px] opacity-40 text-white mb-3 italic">Khách: ${b.user}</p>
                            <div class="bg-cyan-900/20 p-3 rounded mb-4 text-xs font-mono select-all border border-cyan-500/20">${b.account_info}</div>
                            <p class="text-[10px] text-yellow-500 font-bold uppercase mb-1">Ảnh minh chứng (Hiện trang chủ):</p>
                            <input type="text" id="boost-proof-${s.key}" placeholder="https://imgur.com/link-anh.png" class="mb-3 text-xs h-9">
                            <div class="flex gap-2">
                                <button onclick="approveBoost('${s.key}', '${b.user}')" class="btn-green text-xs flex-1">DUYỆT XONG</button>
                                <button onclick="cancelBoost('${s.key}', '${b.user}', ${b.price || 0})" class="btn-red text-xs flex-1 text-white">HỦY ĐƠN</button>
                            </div>
                        </div>`;
                }
            });
        });

        // --- LOGIC XỬ LÝ ---
        async function approveOrder(key, user) {
            const proof = document.getElementById('proof-'+key).value.trim();
            await db.ref('orders/'+key).update({ status: 'Thành công', proof_image: proof });
            alert("Đã duyệt đơn!");
        }

        async function approveBoost(key, user) {
            const proof = document.getElementById('boost-proof-'+key).value.trim();
            if(!proof) return alert("Phải dán link ảnh để hiện trang chủ!");
            await db.ref('boost_orders/'+key).update({ status: 'Thành công', proof_image: proof });
            await db.ref('public_proofs').push({ user: user, image: proof, type: "Cày Thuê", time: new Date().toLocaleDateString('vi-VN') });
            alert("Thành công! Ảnh đã hiện ở trang chủ.");
        }

        async function updateBalance() {
            const user = document.getElementById('target-user').value.trim().toLowerCase();
            const amount = parseInt(document.getElementById('target-amount').value);
            if(!user || isNaN(amount)) return alert("Vui lòng nhập đầy đủ!");
            const ref = db.ref('users/'+user);
            const snap = await ref.get();
            if(!snap.exists()) return alert("User không tồn tại!");
            const newBal = (snap.val().balance || 0) + amount;
            await ref.update({ balance: newBal });
            alert("Đã cộng " + amount.toLocaleString() + "đ thành công!");
        }

        db.ref('bank_requests').on('value', snap => {
            const list = document.getElementById('bank-list');
            list.innerHTML = "";
            snap.forEach(s => {
                const b = s.val();
                if(b.status === 'Chờ duyệt') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-4 rounded-lg flex justify-between items-center border border-white/5">
                            <div><p class="font-bold">${b.user}</p><p class="text-green-400 text-sm">${b.amount.toLocaleString()}đ</p></div>
                            <button onclick="approveBank('${s.key}', '${b.user}', ${b.amount})" class="btn-green text-xs">DUYỆT BANK</button>
                        </div>`;
                }
            });
        });

        async function approveBank(key, user, amount) {
            const snap = await db.ref('users/'+user).get();
            if(snap.exists()) {
                await db.ref('users/'+user).update({ balance: (snap.val().balance || 0) + amount });
                await db.ref('bank_requests/'+key).update({ status: 'Đã duyệt' });
                alert("Đã duyệt bank!");
            }
        }

        db.ref('card_requests').on('value', snap => {
            const list = document.getElementById('card-list');
            list.innerHTML = "";
            snap.forEach(s => {
                const c = s.val();
                if(c.status === 'Chờ duyệt') {
                    list.innerHTML += `
                        <div class="bg-black/40 p-4 rounded-xl border border-yellow-500/20 text-xs">
                            <p class="text-yellow-500 font-bold text-base mb-2">${c.type} ${c.amount}đ</p>
                            <p class="mb-1">Mã: <span class="select-all bg-white/10 p-1 rounded">${c.code}</span></p>
                            <p class="mb-3">Seri: <span class="select-all bg-white/10 p-1 rounded">${c.seri}</span></p>
                            <div class="flex gap-2">
                                <button onclick="approveCard('${s.key}', '${c.user}', ${c.amount})" class="btn-green flex-1">ĐÚNG</button>
                                <button onclick="rejectCard('${s.key}')" class="btn-red flex-1">SAI</button>
                            </div>
                        </div>`;
                }
            });
        });

        async function approveCard(key, user, amount) {
            const snap = await db.ref('users/'+user).get();
            if(snap.exists()) {
                await db.ref('users/'+user).update({ balance: (snap.val().balance || 0) + parseInt(amount) });
                await db.ref('card_requests/'+key).update({ status: 'Thành công' });
                alert("Xong!");
            }
        }
        async function rejectCard(key) { await db.ref('card_requests/'+key).update({ status: 'Thẻ sai' }); alert("Đã từ chối!"); }
        async function cancelOrder(key, user, refund) { 
            if(!confirm("Hủy đơn?")) return; 
            const snap = await db.ref('users/'+user).get(); 
            if(snap.exists()) await db.ref('users/'+user).update({ balance: (snap.val().balance || 0) + refund });
            await db.ref('orders/'+key).update({ status: 'Đã hủy' }); 
        }
        async function cancelBoost(key, user, refund) {
            if(!confirm("Hủy đơn cày thuê?")) return;
            const snap = await db.ref('users/'+user).get();
            if(snap.exists()) await db.ref('users/'+user).update({ balance: (snap.val().balance || 0) + refund });
            await db.ref('boost_orders/'+key).update({ status: 'Đã hủy' });
        }
    </script>
</body>
</html>
