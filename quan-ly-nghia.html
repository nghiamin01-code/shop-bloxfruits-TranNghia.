<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị - Duyệt Đơn Tự Động</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #0b0e14; color: #e2e8f0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #58a6ff; }
        .badge-pending { background: #bb800926; color: #d29922; border: 1px solid #bb80094d; }
        .badge-success { background: #23863626; color: #3fb950; border: 1px solid #2386364d; }
        .sidebar-item.active { background: #1f6feb; color: white; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-[#0d1117] border-r border-[#30363d] p-6 hidden md:block">
            <div class="flex items-center space-x-3 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl">N</div>
                <h1 class="text-xl font-bold tracking-tight">ADMIN PANEL</h1>
            </div>
            
            <nav class="space-y-2">
                <button onclick="switchTab('bank')" class="sidebar-item active w-full flex items-center space-x-3 p-3 rounded-xl transition-all">
                    <i class="fa-solid fa-building-columns"></i> <span>Duyệt Bank/Momo</span>
                </button>
                <button onclick="switchTab('plow')" class="sidebar-item w-full flex items-center space-x-3 p-3 rounded-xl transition-all hover:bg-[#161b22]">
                    <i class="fa-solid fa-bolt"></i> <span>Cày Thuê (Boosting)</span>
                </button>
                <button onclick="switchTab('gift')" class="sidebar-item w-full flex items-center space-x-3 p-3 rounded-xl transition-all hover:bg-[#161b22]">
                    <i class="fa-solid fa-gift"></i> <span>Gamepass / Trái</span>
                </button>
                <div class="my-6 border-t border-[#30363d]"></div>
                <button class="w-full flex items-center space-x-3 p-3 rounded-xl text-red-400 hover:bg-red-500/10">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>Đăng xuất</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8">
            <!-- Header Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card p-6">
                    <p class="text-gray-400 text-sm">Chờ Duyệt Bank</p>
                    <h2 class="text-3xl font-bold mt-1 text-yellow-500" id="stat-bank">0</h2>
                </div>
                <div class="card p-6">
                    <p class="text-gray-400 text-sm">Đơn Cày Thuê</p>
                    <h2 class="text-3xl font-bold mt-1 text-blue-500" id="stat-plow">0</h2>
                </div>
                <div class="card p-6">
                    <p class="text-gray-400 text-sm">Doanh Thu Ngày</p>
                    <h2 class="text-3xl font-bold mt-1 text-green-500">2,450,000đ</h2>
                </div>
            </div>

            <!-- Tab Content: Duyệt Bank -->
            <section id="tab-bank" class="tab-content">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold">Yêu Cầu Nạp Tiền</h3>
                    <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition" onclick="refreshData()">Làm mới dữ liệu</button>
                </div>
                <div class="card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-[#1c2128] text-gray-400 text-sm">
                            <tr>
                                <th class="p-4">Người dùng</th>
                                <th class="p-4">Mã Giao Dịch</th>
                                <th class="p-4">Số tiền</th>
                                <th class="p-4">Trạng thái</th>
                                <th class="p-4">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="bank-list">
                            <!-- Dữ liệu sẽ nạp vào đây -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Tab Content: Cày Thuê -->
            <section id="tab-plow" class="tab-content hidden">
                <h3 class="text-xl font-semibold mb-6">Danh Sách Cày Thuê</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="plow-list">
                    <!-- Card cày thuê -->
                </div>
            </section>

            <!-- Tab Content: Gift -->
            <section id="tab-gift" class="tab-content hidden">
                <h3 class="text-xl font-semibold mb-6">Duyệt Mua Gamepass/Trái Ác Quỷ</h3>
                <div class="card p-4 space-y-4" id="gift-list">
                    <!-- List gift -->
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-green-600 text-white px-6 py-3 rounded-lg shadow-xl flex items-center space-x-2">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-msg">Thành công!</span>
    </div>

    <script>
        // Dữ liệu mẫu (Thực tế bạn sẽ dùng fetch() để lấy từ file PHP hoặc Firebase)
        let data = {
            bank: [
                { id: '1', user: 'NghiaAdmin', code: 'BANK9921', amount: '50,000đ', status: 'pending' },
                { id: '2', user: 'Gamer_VN', code: 'MOMO882', amount: '200,000đ', status: 'pending' }
            ],
            plow: [
                { id: '101', user: 'Vip_Blox', package: 'Cày Max Level', acc: 'roblox_user', pass: 'pass123', status: 'pending' }
            ],
            gift: [
                { id: '201', user: 'SieuNhan', item: 'Gamepass Fast Boats', price: '350 Robux', status: 'pending' }
            ]
        };

        function renderAll() {
            // Render Bank
            const bankList = document.getElementById('bank-list');
            bankList.innerHTML = data.bank.map(item => `
                <tr class="border-t border-[#30363d] hover:bg-[#1c2128]">
                    <td class="p-4">${item.user}</td>
                    <td class="p-4 font-mono text-blue-400">${item.code}</td>
                    <td class="p-4 text-green-500 font-bold">${item.amount}</td>
                    <td class="p-4"><span class="badge-pending px-2 py-1 rounded text-xs uppercase font-bold">${item.status}</span></td>
                    <td class="p-4 space-x-2">
                        <button onclick="approve('bank', '${item.id}')" class="bg-green-600 hover:bg-green-500 p-2 rounded-md"><i class="fa-solid fa-check"></i></button>
                        <button onclick="remove('bank', '${item.id}')" class="bg-red-600 hover:bg-red-500 p-2 rounded-md"><i class="fa-solid fa-xmark"></i></button>
                    </td>
                </tr>
            `).join('');

            // Render Cày Thuê
            const plowList = document.getElementById('plow-list');
            plowList.innerHTML = data.plow.map(item => `
                <div class="card p-5">
                    <div class="flex justify-between mb-3">
                        <span class="text-blue-400 font-bold">${item.package}</span>
                        <span class="text-xs text-gray-500 italic">#${item.id}</span>
                    </div>
                    <div class="text-sm space-y-1 mb-4">
                        <p>👤 <b>User:</b> ${item.acc}</p>
                        <p>🔑 <b>Pass:</b> <span class="bg-gray-800 px-1 rounded">${item.pass}</span></p>
                    </div>
                    <button onclick="approve('plow', '${item.id}')" class="w-full bg-blue-600 py-2 rounded-lg font-bold hover:bg-blue-500">HOÀN TẤT CÀY</button>
                </div>
            `).join('');

            // Render Gift
            const giftList = document.getElementById('gift-list');
            giftList.innerHTML = data.gift.map(item => `
                <div class="flex justify-between items-center p-3 hover:bg-[#1c2128] rounded-lg border border-transparent hover:border-[#30363d]">
                    <div>
                        <p class="font-bold">${item.item}</p>
                        <p class="text-xs text-gray-400">Khách: ${item.user} | Giá: ${item.price}</p>
                    </div>
                    <button onclick="approve('gift', '${item.id}')" class="bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold">XÁC NHẬN GIFT</button>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-bank').innerText = data.bank.length;
            document.getElementById('stat-plow').innerText = data.plow.length;
        }

        function approve(type, id) {
            data[type] = data[type].filter(item => item.id !== id);
            showToast("Đã duyệt đơn thành công!");
            renderAll();
        }

        function remove(type, id) {
            if(confirm("Xóa đơn này?")) {
                data[type] = data[type].filter(item => item.id !== id);
                renderAll();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function refreshData() {
            showToast("Đang đồng bộ dữ liệu...");
            // Thực tế: gọi API tại đây
        }

        // Khởi tạo
        renderAll();
    </script>
</body>
</html>
