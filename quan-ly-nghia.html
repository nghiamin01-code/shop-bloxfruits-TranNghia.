<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Admin - Nghĩa</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; }
        body { font-family: Arial, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-ok { background: #16a34a; }
        .btn-del { background: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ Bảng Điều Khiển Admin - Nghĩa</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('bank')">💰 Yêu cầu Bank</button>
        <button class="tab-btn" onclick="openTab('shop')">🛒 Đơn hàng Shop</button>
        <button class="tab-btn" onclick="openTab('cards')">🎫 Lịch sử Thẻ Cào</button>
    </div>

    <div id="bank" class="tab-content active">
        <table>
            <tr><th>Khách</th><th>Số tiền</th><th>Nội dung</th><th>Hành động</th></tr>
            <tbody id="list-bank"></tbody>
        </table>
    </div>

    <div id="shop" class="tab-content">
        <table>
            <tr><th>Khách</th><th>Sản phẩm</th><th>Giá</th><th>Hành động</th></tr>
            <tbody id="list-shop"></tbody>
        </table>
    </div>

    <div id="cards" class="tab-content">
        <table>
            <tr><th>Khách</th><th>Mệnh giá</th><th>Trạng thái</th><th>Thời gian</th></tr>
            <tbody id="list-cards"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ BƯỚC 1: BẮT BUỘC THAY ĐOẠN NÀY BẰNG CONFIG CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "ten-du-an.firebaseapp.com",
        databaseURL: "https://ten-du-an-default-rtdb.firebaseio.com",
        projectId: "ten-du-an",
        storageBucket: "ten-du-an.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // ⚠️ BƯỚC 2: KIỂM TRA TÊN NHÁNH DỮ LIỆU BÊN DƯỚI
    
    // --- LẮNG NGHE BANK ---
    // Chữ 'bank_requests' phải GIỐNG HỆT lúc bạn push data ở trang Shop
    db.ref('bank_requests').on('value', snap => {
        let html = '';
        snap.forEach(child => {
            let data = child.val();
            if(data.status === 'pending') {
                html += `<tr>
                    <td>${data.username}</td><td>+${data.amount}đ</td><td>${data.content}</td>
                    <td>
                        <button class="btn btn-ok" onclick="duyetBank('${child.key}', '${data.username}', ${data.amount})">Duyệt ✅</button>
                        <button class="btn btn-del" onclick="db.ref('bank_requests/${child.key}').remove()">Xóa</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById('list-bank').innerHTML = html;
    });

    async function duyetBank(id, user, money) {
        let uRef = db.ref('users/' + user + '/balance');
        let s = await uRef.get();
        await uRef.set((s.val() || 0) + Number(money));
        await db.ref('bank_requests/' + id).update({status: "done"});
    }

    // --- LẮNG NGHE ĐƠN HÀNG ---
    // Chữ 'shop_orders' phải GIỐNG HỆT lúc khách bấm Mua ở trang Shop
    db.ref('shop_orders').on('value', snap => {
        let html = '';
        snap.forEach(child => {
            let data = child.val();
            if(data.status === 'pending') {
                html += `<tr>
                    <td>${data.username}</td><td>${data.item}</td><td>${data.price}đ</td>
                    <td><button class="btn btn-ok" onclick="db.ref('shop_orders/${child.key}').update({status: 'done'})">Xong 📦</button></td>
                </tr>`;
            }
        });
        document.getElementById('list-shop').innerHTML = html;
    });

    // --- LẮNG NGHE LỊCH SỬ THẺ CÀO (Từ callback.php) ---
    db.ref('card_history').on('value', snap => {
        let html = '';
        snap.forEach(child => {
            let data = child.val();
            let color = data.status === 'Thành công' ? 'green' : 'red';
            html = `<tr>
                <td>${data.username}</td>
                <td>${data.amount}đ</td>
                <td style="color:${color}; font-weight:bold;">${data.status}</td>
                <td>${data.time}</td>
            </tr>` + html; 
        });
        document.getElementById('list-cards').innerHTML = html;
    });
</script>
</body>
</html>
