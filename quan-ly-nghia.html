<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - SHOP BẮP (Lite)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        input { background: #0f172a; border: 1px solid #334155; padding: 8px; border-radius: 6px; color: white; outline: none; }
        input:focus { border-color: #3b82f6; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
        .tab-active { border-bottom: 3px solid #facc15; color: #facc15; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-400">QUẢN TRỊ VIÊN</h1>
                <p class="text-xs opacity-50 uppercase tracking-tighter">Hệ thống xử lý Shop Bắp</p>
            </div>
            <div class="text-right">
                <div id="status-dot" class="inline-block w-2 h-2 bg-green-500 rounded-full mr-1"></div>
                <span class="text-[10px] opacity-70">REALTIME CONNECTED</span>
            </div>
        </header>

        <div class="flex gap-8 mb-8">
            <button onclick="showTab('tab-bank')" id="btn-bank" class="pb-2 font-bold uppercase text-xs tracking-widest tab-active">Duyệt Banking</button>
            <button onclick="showTab('tab-order')" id="btn-order" class="pb-2 font-bold uppercase text-xs tracking-widest">Đơn Hàng Mới</button>
            <button onclick="showTab('tab-price')" id="btn-price" class="pb-2 font-bold uppercase text-xs tracking-widest">Chỉnh Giá Shop</button>
        </div>

        <div id="tab-bank" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 text-green-400">Yêu cầu Banking</h2>
                <div class="overflow-x-auto">
                    <table>
                        <thead class="bg-black/20 text-gray-400">
                            <tr>
                                <th>Tên Khách</th>
                                <th>Số tiền</th>
                                <th>Thời gian</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="list-bank"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-order" class="tab-content hidden">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 text-yellow-400 font-mono">ĐƠN HÀNG ĐANG CHỜ</h2>
                <div class="overflow-x-auto">
                    <table>
                        <thead class="bg-black/20 text-gray-400">
                            <tr>
                                <th>Khách</th>
                                <th>Vật phẩm</th>
                                <th>Thông tin (TK/MK)</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="list-order"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-price" class="tab-content hidden">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-purple-400">Cập nhật giá vật phẩm</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] uppercase opacity-50">Tên vật phẩm cần sửa</label>
                            <input type="text" id="price-name" placeholder="Ví dụ: Kitsune VV">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] uppercase opacity-50">Giá tiền mới (VNĐ)</label>
                            <input type="number" id="price-val" placeholder="Ví dụ: 500000">
                        </div>
                        <button onclick="updatePrice()" class="btn btn-blue w-full mt-2">XÁC NHẬN ĐỔI GIÁ</button>
                    </div>
                    
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                        <h3 class="text-sm font-bold mb-3 uppercase text-gray-400">Giá đang hiển thị trên Web:</h3>
                        <div id="current-prices" class="text-xs space-y-2 max-h-[300px] overflow-y-auto pr-2">
                            </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Cấu hình Firebase của bạn
        const firebaseConfig = { databaseURL: "https://shop-blox-fruit-trannghia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Chuyển Tab
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('tab-active');
        }

        // --- 1. XỬ LÝ BANKING ---
        db.ref('bank_requests').on('value', snap => {
            let html = '';
            snap.forEach(s => {
                const data = s.val();
                if(data.status === 'Chờ duyệt') {
                    html += `<tr>
                        <td class="font-bold">${data.user}</td>
                        <td class="text-green-400 font-bold">${data.amount.toLocaleString()}đ</td>
                        <td class="opacity-50 text-[11px]">${data.time}</td>
                        <td>
                            <div class="flex gap-2">
                                <button onclick="approveBank('${s.key}', '${data.user}', ${data.amount})" class="btn btn-green text-[10px] py-1">DUYỆT</button>
                                <button onclick="rejectAction('bank_requests', '${s.key}')" class="btn btn-red text-[10px] py-1">HỦY</button>
                            </div>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById('list-bank').innerHTML = html || '<tr><td colspan="4" class="text-center opacity-30 py-10 text-xs italic">Hiện không có yêu cầu nạp tiền nào mới.</td></tr>';
        });

        async function approveBank(id, user, amount) {
            if(!confirm(`Cộng ${amount.toLocaleString()}đ cho ${user}?`)) return;
            const userRef = db.ref('users/' + user.toLowerCase());
            const userSnap = await userRef.get();
            if(userSnap.exists()) {
                const newBal = (userSnap.val().balance || 0) + amount;
                await userRef.update({ balance: newBal });
                await db.ref('bank_requests/' + id).update({ status: 'Thành công' });
                alert("Thành công: Đã cộng tiền cho " + user);
            } else {
                alert("Lỗi: Không tìm thấy tài khoản người dùng này!");
            }
        }

        // --- 2. XỬ LÝ ĐƠN HÀNG ---
        db.ref('orders').on('value', snap => {
            let html = '';
            snap.forEach(s => {
                const data = s.val();
                if(data.status === 'Chờ xử lý') {
                    html += `<tr>
                        <td class="font-bold text-blue-400">${data.user}</td>
                        <td class="text-yellow-400 font-bold">${data.item}</td>
                        <td class="text-[11px] font-mono bg-black/40 p-2 rounded">${data.info}</td>
                        <td>
                            <div class="flex flex-col gap-1">
                                <button onclick="updateOrderStatus('${s.key}', 'Thành công')" class="btn btn-green text-[10px] py-1">HOÀN TẤT</button>
                                <button onclick="updateOrderStatus('${s.key}', 'Hủy')" class="btn btn-red text-[10px] py-1">HỦY ĐƠN</button>
                            </div>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById('list-order').innerHTML = html || '<tr><td colspan="4" class="text-center opacity-30 py-10 text-xs italic">Tất cả đơn hàng đã được xử lý xong!</td></tr>';
        });

        async function updateOrderStatus(id, status) {
            await db.ref('orders/' + id).update({ status: status });
            alert("Trạng thái đơn: " + status);
        }

        // --- 3. CHỈNH GIÁ ---
        async function updatePrice() {
            const name = document.getElementById('price-name').value.trim();
            const val = parseInt(document.getElementById('price-val').value);
            if(!name || isNaN(val)) return alert("Vui lòng nhập tên vật phẩm và số tiền hợp lệ!");
            
            await db.ref('settings/prices/' + name).set(val);
            alert(`Đã đổi giá ${name} thành ${val.toLocaleString()}đ`);
            document.getElementById('price-name').value = "";
            document.getElementById('price-val').value = "";
        }

        db.ref('settings/prices').on('value', snap => {
            let html = '';
            if(snap.exists()) {
                snap.forEach(s => {
                    html += `<div class="flex justify-between items-center border-b border-white/5 py-2">
                        <span class="opacity-80">${s.key}</span>
                        <div class="flex items-center gap-3">
                            <b class="text-yellow-400">${s.val().toLocaleString()}đ</b>
                            <button onclick="deletePrice('${s.key}')" class="text-red-500 font-bold text-xs hover:underline">Xóa</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('current-prices').innerHTML = html || 'Chưa có giá tùy chỉnh nào.';
        });

        async function deletePrice(name) {
            if(confirm(`Xóa giá tùy chỉnh của ${name}?`)) {
                await db.ref('settings/prices/' + name).remove();
            }
        }

        async function rejectAction(path, id) {
            if(confirm("Hủy yêu cầu này?")) {
                await db.ref(path + '/' + id).update({ status: 'Hủy' });
            }
        }
    </script>
</body>
</html>
