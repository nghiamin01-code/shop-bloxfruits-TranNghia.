<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - SHOP BẮP (FIXED DATA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        #admin-content { display: none; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        .btn-tab { padding: 10px 15px; border-radius: 8px; font-weight: bold; background: #334155; color: #94a3b8; white-space: nowrap; font-size: 13px; }
        .btn-tab.active { background: #3b82f6; color: white; }
        .btn-green { background: #22c55e; color: black; font-weight: bold; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 bg-[#0f172a] z-[999] flex items-center justify-center p-6">
        <div class="max-w-sm w-full bg-[#1e293b] p-8 rounded-2xl border border-blue-500/30 text-center">
            <h2 class="text-2xl font-bold text-blue-400 mb-6">Xác minh Admin</h2>
            <input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." class="text-center mb-4">
            <button onclick="checkPass()" class="btn-green w-full py-3">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="admin-content" class="p-4 lg:p-10">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-black mb-8 text-yellow-400 text-center uppercase">Quản Trị Shop Bắp</h1>

            <div class="flex overflow-x-auto gap-2 mb-8 justify-center no-scrollbar">
                <button class="btn-tab active" onclick="openTab(event, 'tab-boost')">🎮 Cày Thuê</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-items')">🍎 Trái Ác Quỷ/GP</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-cards')">💳 Duyệt Thẻ</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-bank')">🏦 Duyệt Bank</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-price')">🏷️ Đổi Giá</button>
                <button class="btn-tab" onclick="openTab(event, 'tab-money')">💰 Cộng Tiền</button>
            </div>

            <div class="card min-h-[450px]">
                <div id="tab-boost" class="tab-content active">
                    <h2 class="text-xl font-bold mb-4 text-blue-400 border-b border-white/10 pb-2">🎮 Đơn Cày Thuê (Mục orders)</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th>Khách hàng</th>
                                    <th>Gói / TK / MK</th>
                                    <th>Link Ảnh Minh Chứng</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="list-boost"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-items" class="tab-content">
                    <h2 class="text-xl font-bold mb-4 text-purple-400 border-b border-white/10 pb-2">🍎 Đơn Vật Phẩm (Mục orders_items)</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th>Khách hàng</th>
                                    <th>Món / TK / MK</th>
                                    <th>Link Ảnh Minh Chứng</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="list-items"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-cards" class="tab-content"><table><thead><tr><th>User</th><th>Loại/Mệnh giá</th><th>Mã/Seri</th><th>Duyệt</th></tr></thead><tbody id="list-cards"></tbody></table></div>
                <div id="tab-bank" class="tab-content"><table><thead><tr><th>User</th><th>Số tiền</th><th>Ảnh Bill</th><th>Duyệt</th></tr></thead><tbody id="list-bank"></tbody></table></div>
                <div id="tab-price" class="tab-content"><div class="max-w-md mx-auto space-y-4"><input type="text" id="product-name-input" placeholder="Tên sản phẩm..."><input type="number" id="new-price-input" placeholder="Giá mới..."><button onclick="updatePriceByName()" class="btn-green w-full">CẬP NHẬT GIÁ</button></div></div>
                <div id="tab-money" class="tab-content"><div class="max-w-md mx-auto space-y-4"><input type="text" id="target-user" placeholder="Tên User"><input type="number" id="target-amount" placeholder="Số tiền..."><button onclick="updateBalance()" class="btn-green w-full">CỘNG TIỀN</button></div></div>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH FIREBASE
        const firebaseConfig = { databaseURL: "https://shop-blox-fruit-trannghia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPass() {
            if(document.getElementById('admin-pass').value === 'nghia672011') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadAllData(); 
            }
        }

        function openTab(evt, tabName) {
            let content = document.getElementsByClassName("tab-content");
            for (let i = 0; i < content.length; i++) content[i].classList.remove("active");
            let tabs = document.getElementsByClassName("btn-tab");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- HÀM LOAD DỮ LIỆU ĐÃ FIX THEO ẢNH CỦA BẠN ---
        function loadAllData() {
            // 1. Load Cày Thuê từ mục 'orders'
            db.ref('orders').on('value', s => {
                const b = document.getElementById('list-boost'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    if(d.status === "pending" || d.status === "đang chờ") {
                        b.innerHTML += `<tr>
                            <td>${d.user || 'Ẩn danh'}</td>
                            <td><b>${d.service || 'Cày thuê'}</b><br><span class="text-xs text-slate-400">TK: ${d.username || ''} | MK: ${d.password || ''}</span></td>
                            <td><input type="text" id="proof-${c.key}" placeholder="Dán link ảnh gift..." class="text-xs border border-white/10 p-1"></td>
                            <td><button onclick="completeOrder('orders','${c.key}')" class="btn-green text-xs">XONG</button></td>
                        </tr>`;
                    }
                });
            });

            // 2. Load Vật phẩm từ mục 'orders_items'
            db.ref('orders_items').on('value', s => {
                const b = document.getElementById('list-items'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    if(d.status === "pending" || d.status === "đang chờ") {
                        b.innerHTML += `<tr>
                            <td>${d.user || 'Ẩn danh'}</td>
                            <td><b>${d.item || 'Vật phẩm'}</b><br><span class="text-xs text-slate-400">TK: ${d.username || ''} | MK: ${d.password || ''}</span></td>
                            <td><input type="text" id="proof-${c.key}" placeholder="Dán link ảnh gift..." class="text-xs border border-white/10 p-1"></td>
                            <td><button onclick="completeOrder('orders_items','${c.key}')" class="btn-green text-xs">XONG</button></td>
                        </tr>`;
                    }
                });
            });

            // 3. Load Nạp thẻ & Bank
            db.ref('nap_the').on('value', s => {
                const b = document.getElementById('list-cards'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    if(d.status === "pending" || d.status === "chờ duyệt") {
                        b.innerHTML += `<tr><td>${d.username}</td><td>${d.type}<br>${Number(d.amount).toLocaleString()}đ</td><td>Mã: ${d.pin}<br>Seri: ${d.serial}</td>
                        <td><button onclick="approvePay('nap_the','${c.key}',${d.amount},'${d.username}')" class="btn-green text-xs">Duyệt</button></td></tr>`;
                    }
                });
            });

            db.ref('nap_bank').on('value', s => {
                const b = document.getElementById('list-bank'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    if(d.status === "pending" || d.status === "chờ duyệt") {
                        const img = d.image ? `<img src="${d.image}" class="img-preview">` : 'Không ảnh';
                        b.innerHTML += `<tr><td>${d.username}</td><td>${Number(d.amount).toLocaleString()}đ</td><td>${img}</td>
                        <td><button onclick="approvePay('nap_bank','${c.key}',${d.amount},'${d.username}')" class="btn-green text-xs">Duyệt</button></td></tr>`;
                    }
                });
            });
        }

        async function completeOrder(path, id) {
            const proof = document.getElementById('proof-' + id).value.trim();
            await db.ref(path + '/' + id).update({ 
                status: 'Hoàn thành',
                admin_proof: proof,
                time_done: new Date().toLocaleString()
            });
            alert("✅ Đã hoàn thành đơn!");
        }

        async function approvePay(path, id, amount, user) {
            const uRef = db.ref('users/' + user.toLowerCase());
            const s = await uRef.get();
            if(s.exists()){
                await uRef.update({ balance: (s.val().balance || 0) + parseInt(amount) });
                await db.ref(path+'/'+id).update({ status: 'thành công' });
                alert("✅ Đã cộng tiền cho " + user);
            }
        }

        async function updatePriceByName() {
            const name = document.getElementById('product-name-input').value.trim();
            const price = parseInt(document.getElementById('new-price-input').value);
            const snap = await db.ref('products').once('value');
            let key = null;
            snap.forEach(c => { if(c.val().name && c.val().name.toLowerCase() === name.toLowerCase()) key = c.key; });
            if(key) { await db.ref('products/'+key).update({ price: price }); alert("✅ Đã đổi giá!"); }
        }

        async function updateBalance() {
            const u = document.getElementById('target-user').value.trim().toLowerCase();
            const a = parseInt(document.getElementById('target-amount').value);
            const snap = await db.ref('users/'+u).get();
            if(snap.exists()) {
                await db.ref('users/'+u).update({ balance: (snap.val().balance || 0) + a });
                alert("✅ Đã cộng tiền!");
            }
        }
    </script>
</body>
</html>
